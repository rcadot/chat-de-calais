# pytest.ini
[pytest]
pythonpath = .          # ✅ AJOUTER cette ligne (point = racine du projet)
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-branch
    --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
